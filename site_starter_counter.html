<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Public Site</title>
  <style>
    :root {
      --bg1: #0f172a;
      --bg2: #1e293b;
      --card: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.14);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --accent: #38bdf8;
      --shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.18), transparent 30%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(920px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 32px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .eyebrow {
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 0.78rem;
      font-weight: 700;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 5vw, 4rem);
      line-height: 1.05;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.7;
      max-width: 60ch;
    }

    .counter {
      margin-top: 28px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 14px;
    }

    .unit {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 18px;
      padding: 18px 14px;
      text-align: center;
    }

    .value {
      display: block;
      font-size: clamp(1.8rem, 3vw, 2.6rem);
      font-weight: 700;
      margin-bottom: 6px;
    }

    .label {
      font-size: 0.9rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .footer {
      margin-top: 20px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    code {
      color: #e2e8f0;
      background: rgba(255, 255, 255, 0.08);
      padding: 2px 8px;
      border-radius: 999px;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="eyebrow">Public site</div>
    <h1>Your website is live.</h1>
    <p>
      This page shows exactly how long your site has existed. Change the date in
      <code>siteCreatedAt</code> to the moment your website officially went live.
    </p>

    <section class="counter" aria-label="Site age counter">
      <div class="unit"><span class="value" id="days">0</span><span class="label">Days</span></div>
      <div class="unit"><span class="value" id="hours">0</span><span class="label">Hours</span></div>
      <div class="unit"><span class="value" id="minutes">0</span><span class="label">Minutes</span></div>
      <div class="unit"><span class="value" id="seconds">0</span><span class="label">Seconds</span></div>
    </section>

    <div class="footer" id="created-text"></div>
  </main>

  <script>
    // Put your real launch date and time here.
    // Format: year, monthIndex (0 = Jan), day, hour, minute, second
    const siteCreatedAt = new Date(2026, 3, 9, 12, 0, 0);

    const daysEl = document.getElementById('days');
    const hoursEl = document.getElementById('hours');
    const minutesEl = document.getElementById('minutes');
    const secondsEl = document.getElementById('seconds');
    const createdTextEl = document.getElementById('created-text');

    createdTextEl.textContent = `Created on ${siteCreatedAt.toLocaleString()}`;

    function updateCounter() {
      const now = new Date();
      const diffMs = now - siteCreatedAt;

      if (diffMs < 0) {
        daysEl.textContent = '0';
        hoursEl.textContent = '0';
        minutesEl.textContent = '0';
        secondsEl.textContent = '0';
        createdTextEl.textContent = 'The launch date is set in the future.';
        return;
      }

      const totalSeconds = Math.floor(diffMs / 1000);
      const days = Math.floor(totalSeconds / 86400);
      const hours = Math.floor((totalSeconds % 86400) / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;

      daysEl.textContent = String(days);
      hoursEl.textContent = String(hours).padStart(2, '0');
      minutesEl.textContent = String(minutes).padStart(2, '0');
      secondsEl.textContent = String(seconds).padStart(2, '0');
    }

    updateCounter();
    setInterval(updateCounter, 1000);
  </script>
</body>
</html>
